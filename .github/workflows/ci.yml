name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  visual:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @cofob/design-system-css
      - run: npm run build --workspace @cofob/design-system-react
      - run: npm run build --workspace @cofob/design-system-svelte
      - run: npm run build --workspace @cofob/design-system-showroom
      - run: npx playwright install chromium
      - run: npm run test:visual
